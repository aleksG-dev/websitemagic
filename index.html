<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Brand favicon: inline SVG mark — a white "W" with a gold sparkle on the
         purple→blue brand gradient. Self-contained (data URI), nothing extra to
         load. The untyped link below is the fallback for the rare engine that
         doesn't read SVG favicons. -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='32' y2='32' gradientUnits='userSpaceOnUse'%3E%3Cstop offset='0' stop-color='%23a855f7'/%3E%3Cstop offset='1' stop-color='%236366f1'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='9' fill='url(%23g)'/%3E%3Cpath d='M7 10.5 10.5 22 16 14 21.5 22 25 10.5' fill='none' stroke='%23fff' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M25 4.5c.32 2.1 1.05 2.84 3.15 3.15-2.1.32-2.84 1.05-3.15 3.15-.32-2.1-1.05-2.84-3.15-3.15 2.1-.32 2.84-1.05 3.15-3.15z' fill='%23ffd27a'/%3E%3C/svg%3E"
    />
    <link
      rel="alternate icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='32' y2='32' gradientUnits='userSpaceOnUse'%3E%3Cstop offset='0' stop-color='%23a855f7'/%3E%3Cstop offset='1' stop-color='%236366f1'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='9' fill='url(%23g)'/%3E%3Cpath d='M7 10.5 10.5 22 16 14 21.5 22 25 10.5' fill='none' stroke='%23fff' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M25 4.5c.32 2.1 1.05 2.84 3.15 3.15-2.1.32-2.84 1.05-3.15 3.15-.32-2.1-1.05-2.84-3.15-3.15 2.1-.32 2.84-1.05 3.15-3.15z' fill='%23ffd27a'/%3E%3C/svg%3E"
    />

    <title>Website Magic ✦ — Custom websites that win local businesses customers</title>
    <meta
      name="description"
      content="Custom-designed, mobile-perfect websites for UK local businesses — builders, salons, plumbers and other trades. Built to get you found and booked. DM on TikTok."
    />
    <meta name="theme-color" content="#140A22" />
    <meta name="color-scheme" content="dark" />

    <!-- Open Graph / social preview (swap og:image + url for your own later) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://websitemagic.co.uk/" />
    <meta property="og:title" content="Website Magic ✦ — websites that win you customers" />
    <meta
      property="og:description"
      content="Custom, mobile-perfect websites for UK builders, salons, plumbers and other local trades. Built to get you found and booked."
    />
    <meta property="og:image" content="https://websitemagic.co.uk/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Website Magic — websites that get local businesses booked solid."
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Website Magic ✦" />
    <meta
      name="twitter:description"
      content="Custom websites for UK builders, salons, plumbers and other local trades — built to get you booked."
    />
    <meta name="twitter:image" content="https://websitemagic.co.uk/og-image.png" />

    <!-- Fonts: Bricolage Grotesque (display), Inter (body), Space Mono (labels) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500..800&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Playfair+Display:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Structured data: tells Google this is a local web-design service -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "name": "Website Magic",
        "description": "Custom-designed, mobile-first websites for local businesses, built to convert visitors into customers.",
        "serviceType": "Web design",
        "areaServed": "Local businesses",
        "slogan": "Your website should be winning you customers — not collecting dust."
      }
    </script>
  </head>
  <body>
    <div id="root"></div>

    <!-- Hidden static form so Netlify detects the contact form at deploy time
         (the real one is JS-rendered). Keep fields in sync with
         src/components/ContactForm.jsx. -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="text" name="business" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
