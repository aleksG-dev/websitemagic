<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon: a gold sparkle on deep violet (inline so there's nothing extra to load) -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23140A22'/%3E%3Cpath d='M16 6c.7 4.6 2.4 6.3 7 7-4.6.7-6.3 2.4-7 7-.7-4.6-2.4-6.3-7-7 4.6-.7 6.3-2.4 7-7z' fill='%23FFD27A'/%3E%3C/svg%3E"
    />

    <title>Website Magic ✦ — Custom websites that win local businesses customers</title>
    <meta
      name="description"
      content="Custom-designed, mobile-perfect websites for local businesses — barbers, cafés, gyms, salons, trades. Built to get you found and booked. DM on TikTok."
    />
    <meta name="theme-color" content="#140A22" />
    <meta name="color-scheme" content="dark" />

    <!-- Open Graph / social preview (swap og:image + url for your own later) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Website Magic ✦ — websites that win you customers" />
    <meta
      property="og:description"
      content="Custom, mobile-perfect websites for local businesses. Built to get you found and booked."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Website Magic ✦" />
    <meta
      name="twitter:description"
      content="Custom websites for local businesses, built to get you booked."
    />

    <!-- Fonts: Bricolage Grotesque (display), Inter (body), Space Mono (labels) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500..800&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- Structured data: tells Google this is a local web-design service -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "name": "Website Magic",
        "description": "Custom-designed, mobile-first websites for local businesses, built to convert visitors into customers.",
        "serviceType": "Web design",
        "areaServed": "Local businesses",
        "slogan": "Your website should be winning you customers — not collecting dust."
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
